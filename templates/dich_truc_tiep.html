<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Dịch thuật Hội trường LED</title>
    <style>
        /* CSS reset & cơ bản */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background-color: #000; color: #fff; }

        /* MÀN HÌNH CÀI ĐẶT (Sẽ ẩn đi khi bắt đầu) */
        #setup-panel {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .setup-box {
            background: #2a2a2a;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 600px;
        }
        .setup-box h2 { margin-bottom: 20px; color: #4CAF50; text-align: center; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px;
            background: #333; color: #fff;
            border: 1px solid #555; border-radius: 6px;
            font-size: 16px;
        }
        .input-group input:focus { border-color: #4CAF50; outline: none; }
        .btn-start {
            width: 100%; padding: 15px;
            background-color: #4CAF50; color: white;
            border: none; border-radius: 6px;
            font-size: 18px; font-weight: bold;
            cursor: pointer; transition: background 0.3s;
        }
        .btn-start:hover { background-color: #45a049; }

        /* MÀN HÌNH HIỂN THỊ LED (Nền đen hoàn toàn) */
        #led-panel {
            display: none; /* Ẩn mặc định */
            width: 100vw; height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }
        #text-vi {
            font-size: 3.5vw;
            color: #888888; /* Màu xám để không át bản dịch chính */
            margin-bottom: 3vh;
            min-height: 5vw;
            line-height: 1.3;
        }
        #text-target {
            font-size: 5.5vw;
            color: #FFD700; /* Màu Vàng Gold nổi bật trên nền đen */
            font-weight: bold;
            line-height: 1.3;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #status-indicator {
            position: absolute;
            top: 20px; left: 20px;
            color: #555; font-size: 14px;
        }
        /* Nút thoat ẩn góc phải dưới */
        #btn-exit {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(255,255,255,0.1); color: #fff;
            border: none; padding: 10px 15px; border-radius: 5px;
            cursor: pointer; opacity: 0; transition: opacity 0.3s;
        }
        #led-panel:hover #btn-exit { opacity: 1; }
    </style>
</head>
<body>

    <!-- GIAO DIỆN CÀI ĐẶT -->
    <div id="setup-panel">
        <div class="setup-box">
            <h2>Thiết lập Phiên dịch</h2>
            <div class="input-group">
                <label for="apiKey">Khóa API Google AI Studio (Bắt buộc):</label>
                <input type="password" id="apiKey" placeholder="Dán mã API Key vào đây..." autocomplete="off">
            </div>
            <div class="input-group">
                <label for="targetLang">Dịch sang ngôn ngữ:</label>
                <select id="targetLang">
                    <option value="tiếng Nhật">Tiếng Nhật (Japanese)</option>
                    <option value="tiếng Anh">Tiếng Anh (English)</option>
                </select>
            </div>
            <button class="btn-start" onclick="startApp()">BẮT ĐẦU NGHE & DỊCH</button>
            <p style="margin-top:15px; font-size:13px; color:#888; text-align:center;">
                * Cấp quyền Microphone cho trình duyệt khi được yêu cầu. <br>
                * Sau khi bắt đầu, hãy nhấn phím F11 để bật toàn màn hình (Full Screen).
            </p>
        </div>
    </div>

    <!-- GIAO DIỆN MÀN HÌNH LED -->
    <div id="led-panel">
        <div id="status-indicator">Đang khởi động micro...</div>
        <div id="text-vi">Sẵn sàng thu âm...</div>
        <div id="text-target">...</div>
        <button id="btn-exit" onclick="location.reload()">Kết thúc / Cài đặt lại</button>
    </div>

    <script>
        // Các biến toàn cục
        let apiKey = "";
        let targetLang = "";
        let recognition;
        let isRunning = false;

        // Lấy các phần tử DOM
        const setupPanel = document.getElementById('setup-panel');
        const ledPanel = document.getElementById('led-panel');
        const textVi = document.getElementById('text-vi');
        const textTarget = document.getElementById('text-target');
        const statusIndicator = document.getElementById('status-indicator');

        // Hàm khởi động ứng dụng
        function startApp() {
            apiKey = document.getElementById('apiKey').value.trim();
            targetLang = document.getElementById('targetLang').value;

            if (!apiKey) {
                alert("Vui lòng nhập API Key từ Google AI Studio!");
                return;
            }

            // Chuyển đổi giao diện
            setupPanel.style.display = 'none';
            ledPanel.style.display = 'flex';
            isRunning = true;

            initSpeechRecognition();
        }

        // Khởi tạo công cụ nhận diện giọng nói
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                textVi.innerText = "[LỖI TRÌNH DUYỆT]";
                textTarget.innerText = "Trình duyệt không hỗ trợ nhận diện giọng nói. Vui lòng dùng Google Chrome.";
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'vi-VN';
            recognition.continuous = true;       // Nghe liên tục
            recognition.interimResults = false;  // Chờ nói hết câu mới xử lý để dịch chuẩn ngữ cảnh

            recognition.onstart = () => {
                statusIndicator.innerText = "🔴 Đang nghe...";
                statusIndicator.style.color = "#ff4444";
            };

            recognition.onresult = async (event) => {
                // Lấy câu vừa nói xong
                const currentTranscript = event.results[event.results.length - 1][0].transcript.trim();
                
                if (currentTranscript.length > 0) {
                    textVi.innerText = currentTranscript;
                    textTarget.innerText = "Đang dịch...";
                    textTarget.style.color = "#555"; // Làm mờ trong lúc đợi

                    // Gọi hàm dịch thuật
                    await translateText(currentTranscript);
                }
            };

            recognition.onerror = (event) => {
                console.error("Lỗi Micro:", event.error);
                if (event.error === 'not-allowed') {
                    textTarget.innerText = "[LỖI]: Chưa cấp quyền Microphone cho trình duyệt.";
                }
            };

            // Cơ chế tự động kết nối lại nếu bị ngắt (do im lặng lâu)
            recognition.onend = () => {
                if (isRunning) {
                    statusIndicator.innerText = "Đang kết nối lại micro...";
                    statusIndicator.style.color = "#888";
                    setTimeout(() => {
                        try { recognition.start(); } catch(e){}
                    }, 500);
                }
            };

            // Kích hoạt nghe
            recognition.start();
        }

        // Hàm gọi API Gemini để dịch
        async function translateText(textToTranslate) {
            const prompt = `Bạn là một phiên dịch viên cao cấp tại một buổi Gala Dinner / Tiếp khách đối tác. Hãy dịch câu tiếng Việt sau đây sang ${targetLang}. 
Yêu cầu: Chỉ trả về câu dịch, không giải thích, không thêm dấu ngoặc kép thừa. Chú ý phong cách lịch sự, trang trọng.
Câu cần dịch: "${textToTranslate}"`;

            try {
                // Đổi thành model gemini-1.5-flash-latest để khắc phục lỗi "not found"
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: {
                            temperature: 0.3 // Mức độ sáng tạo thấp để bám sát nghĩa gốc
                        }
                    })
                });

                // Xử lý báo lỗi chi tiết nếu Google từ chối
                if (!response.ok) {
                    const errData = await response.json();
                    let errMsg = errData.error.message;
                    if (response.status === 400) errMsg = "API Key không hợp lệ. Vui lòng kiểm tra lại.";
                    throw new Error(errMsg);
                }

                const data = await response.json();
                
                // Trích xuất kết quả dịch
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    let translation = data.candidates[0].content.parts[0].text.trim();
                    textTarget.style.color = "#FFD700"; // Hiện màu vàng lại
                    textTarget.innerText = translation;
                } else {
                    throw new Error("Dữ liệu trả về bị rỗng.");
                }

            } catch (error) {
                console.error("Lỗi API Gemini:", error);
                textTarget.style.color = "#ff4444"; // Chuyển màu đỏ báo lỗi
                textTarget.innerText = `[LỖI]: ${error.message}`;
            }
        }
    </script>
</body>
</html>
